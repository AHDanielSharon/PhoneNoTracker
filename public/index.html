<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Location (Consent Mode)</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-glow"></div>
    <main class="app-shell">
      <header class="topbar neon-card">
        <h1>✨ Consent Live Location Tracker</h1>
        <p>
          Privacy-safe mode: both sides must open this app, join the same room code,
          and allow GPS sharing.
        </p>
      </header>

      <section class="controls neon-card">
        <div class="control-grid">
          <label>
            Room Code
            <input id="roomId" placeholder="e.g. india-demo-108" />
          </label>

          <label>
            Your Role
            <select id="role">
              <option value="me">Me</option>
              <option value="target">Target (consenting person)</option>
            </select>
          </label>

          <button id="joinBtn" class="btn-glow">Join + Start Sharing</button>
        </div>

        <div class="status-row">
          <div class="pill" id="status">Not connected</div>
          <div class="pill" id="distance">Distance: --</div>
        </div>
      </section>

      <section class="map-wrap neon-card">
        <div id="map"></div>
      </section>
    </main>

    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="app.js"></script>
  </body>
</html>
